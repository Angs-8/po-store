spring:
  application:
    name: product
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: jdbc:postgresql://postgres:5432/explore_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

server:
  port: 8081